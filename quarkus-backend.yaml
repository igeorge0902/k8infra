apiVersion: v1
kind: Namespace
metadata:
  name: cinemas
---
# ===================== pictures PVC =====================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pictures-pvc
  namespace: cinemas
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: cinemas
data:
  00-init.sql: |
    CREATE DATABASE IF NOT EXISTS login_;
    CREATE DATABASE IF NOT EXISTS book;
    CREATE USER IF NOT EXISTS 'sqluser'@'%' IDENTIFIED BY 'sqluserpw';
    GRANT ALL PRIVILEGES ON login_.* TO 'sqluser'@'%';
    GRANT ALL PRIVILEGES ON book.* TO 'sqluser'@'%';
    FLUSH PRIVILEGES;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args: ["--lower-case-table-names=1"]
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: rootpw
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: mysql-data
          emptyDir: {}
        - name: mysql-init
          configMap:
            name: mysql-init
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: cinemas
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: zookeeper:3.9
          ports:
            - containerPort: 2181
          env:
            - name: ZOO_STANDALONE_ENABLED
              value: "true"
            - name: ZOO_ADMINSERVER_ENABLED
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: cinemas
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
      targetPort: 2181
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: cinemas
data:
  server.properties: |
    broker.id=1
    listeners=PLAINTEXT://:9092
    advertised.listeners=PLAINTEXT://kafka:9092
    log.dirs=/var/lib/kafka/data
    zookeeper.connect=zookeeper:2181
    num.partitions=3
    offsets.topic.replication.factor=1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          command: ["/bin/sh", "-c"]
          args:
            - exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties
          ports:
            - containerPort: 9092
          volumeMounts:
            - name: kafka-config
              mountPath: /opt/kafka/config/server.properties
              subPath: server.properties
      volumes:
        - name: kafka-config
          configMap:
            name: kafka-config
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: cinemas
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apache-config
  namespace: cinemas
data:
  proxy.conf: |
    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket routes MUST appear before their parent HTTP routes
    # (Apache mod_proxy is first-match; /mbook-1 would swallow /mbook-1/ws)
    ProxyPass /mbook-1/ws ws://mbook:8888/mbook-1/ws
    ProxyPassReverse /mbook-1/ws ws://mbook:8888/mbook-1/ws

    ProxyPass /mbooks-1/ws ws://mbooks:8080/mbooks-1/ws
    ProxyPassReverse /mbooks-1/ws ws://mbooks:8080/mbooks-1/ws

    ProxyPass /login http://dalogin:8080/login retry=0
    ProxyPassReverse /login http://dalogin:8080/login

    ProxyPass /mbook-1 http://mbook:8888/mbook-1 retry=0
    ProxyPassReverse /mbook-1 http://mbook:8888/mbook-1

    ProxyPass /mbooks-1 http://mbooks:8080/mbooks-1 retry=0
    ProxyPassReverse /mbooks-1 http://mbooks:8080/mbooks-1

    ProxyPass /simple-service-webapp http://simple-service-webapp:8085/simple-service-webapp retry=0
    ProxyPassReverse /simple-service-webapp http://simple-service-webapp:8085/simple-service-webapp
---
# ===================== dalogin =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dalogin
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dalogin
  template:
    metadata:
      labels:
        app: dalogin
    spec:
      containers:
        - name: dalogin
          image: dalogin-quarkus:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: jdbc:mysql://mysql:3306/login_
            - name: WILDFLY_URL
              value: http://apache
            - name: QUARKUS_DATASOURCE_DB_KIND
              value: mysql
            - name: QUARKUS_DATASOURCE_USERNAME
              value: sqluser
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: sqluserpw
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: jdbc:mysql://mysql:3306/login_
            - name: QUARKUS_OTEL_ENABLED
              value: "true"
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger:4318
            - name: QUARKUS_OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
---
apiVersion: v1
kind: Service
metadata:
  name: dalogin
  namespace: cinemas
spec:
  selector:
    app: dalogin
  ports:
    - port: 8080
      targetPort: 8080
---
# ===================== mbook =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mbook
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mbook
  template:
    metadata:
      labels:
        app: mbook
    spec:
      containers:
        - name: mbook
          image: mbook-quarkus:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          env:
            - name: DB_URL
              value: jdbc:mysql://mysql:3306/login_
            - name: QUARKUS_DATASOURCE_DB_KIND
              value: mysql
            - name: QUARKUS_DATASOURCE_USERNAME
              value: sqluser
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: sqluserpw
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: jdbc:mysql://mysql:3306/login_
            - name: BOOTSTRAP_URL
              value: kafka:9092
            - name: QUARKUS_OTEL_ENABLED
              value: "true"
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger:4317
---
apiVersion: v1
kind: Service
metadata:
  name: mbook
  namespace: cinemas
spec:
  selector:
    app: mbook
  ports:
    - port: 8888
      targetPort: 8888
---
# ===================== mbooks =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mbooks
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mbooks
  template:
    metadata:
      labels:
        app: mbooks
    spec:
      containers:
        - name: mbooks
          image: mbooks-quarkus:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL_BOOKS
              value: jdbc:mysql://mysql:3306/book
            - name: QUARKUS_DATASOURCE_DB_KIND
              value: mysql
            - name: QUARKUS_DATASOURCE_USERNAME
              value: sqluser
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: sqluserpw
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: jdbc:mysql://mysql:3306/book
            - name: BOOTSTRAP_URL
              value: kafka:9092
            - name: QUARKUS_OTEL_ENABLED
              value: "true"
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger:4317
          readinessProbe:
            httpGet:
              path: /mbooks-1/rest/book/hello
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mbooks
  namespace: cinemas
spec:
  selector:
    app: mbooks
  ports:
    - port: 8080
      targetPort: 8080
---
# ===================== simple-service-webapp (pictures) =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-service-webapp
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-service-webapp
  template:
    metadata:
      labels:
        app: simple-service-webapp
    spec:
      containers:
        - name: simple-service-webapp
          image: simple-service-webapp-quarkus:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          env:
            - name: PICTURES_BASE_DIR
              value: /pictures
            - name: QUARKUS_OTEL_ENABLED
              value: "true"
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger:4318
            - name: QUARKUS_OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
          volumeMounts:
            - name: pictures
              mountPath: /pictures
      volumes:
        - name: pictures
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: simple-service-webapp
  namespace: cinemas
spec:
  selector:
    app: simple-service-webapp
  ports:
    - port: 8085
      targetPort: 8085
---
# ===================== apache reverse proxy =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apache
  template:
    metadata:
      labels:
        app: apache
    spec:
      containers:
        - name: apache
          image: httpd:2.4-alpine
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              sed -i 's/^#LoadModule proxy_module /LoadModule proxy_module /' /usr/local/apache2/conf/httpd.conf
              sed -i 's/^#LoadModule proxy_http_module /LoadModule proxy_http_module /' /usr/local/apache2/conf/httpd.conf
              sed -i 's/^#LoadModule proxy_wstunnel_module /LoadModule proxy_wstunnel_module /' /usr/local/apache2/conf/httpd.conf
              printf '\nInclude conf/extra/proxy.conf\n' >> /usr/local/apache2/conf/httpd.conf
              httpd-foreground
          ports:
            - containerPort: 80
          volumeMounts:
            - name: apache-config
              mountPath: /usr/local/apache2/conf/extra/proxy.conf
              subPath: proxy.conf
      volumes:
        - name: apache-config
          configMap:
            name: apache-config
---
apiVersion: v1
kind: Service
metadata:
  name: apache
  namespace: cinemas
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: apache
---
# ===================== jaeger (tracing UI + OTLP collector) =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 16686
              name: ui
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: QUERY_BASE_PATH
              value: /jaeger
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: cinemas
spec:
  selector:
    app: jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: ui
      port: 16686
      targetPort: 16686
---
# ===================== ingress =====================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apache-ingress
  namespace: cinemas
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - milo.crabdance.com
      secretName: cinemas-tls
  rules:
    - host: milo.crabdance.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apache
                port:
                  number: 80
---
# ===================== jaeger UI ingress =====================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger-ingress
  namespace: cinemas
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - milo.crabdance.com
      secretName: cinemas-tls
  rules:
    - host: milo.crabdance.com
      http:
        paths:
          - path: /jaeger
            pathType: Prefix
            backend:
              service:
                name: jaeger
                port:
                  number: 16686
