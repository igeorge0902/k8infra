apiVersion: v1
kind: Namespace
metadata:
  name: cinemas
---
# ===================== pictures PVC =====================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pictures-pvc
  namespace: cinemas
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: cinemas
data:
  00-init.sql: |
    CREATE DATABASE IF NOT EXISTS login_;
    CREATE DATABASE IF NOT EXISTS book;
    CREATE USER IF NOT EXISTS 'sqluser'@'%' IDENTIFIED BY 'sqluserpw';
    GRANT ALL PRIVILEGES ON login_.* TO 'sqluser'@'%';
    GRANT ALL PRIVILEGES ON book.* TO 'sqluser'@'%';
    FLUSH PRIVILEGES;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args: ["--lower-case-table-names=1"]
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: rootpw
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
        - name: mysqld-exporter
          image: prom/mysqld-exporter:v0.16.0
          args:
            - --mysqld.address=localhost:3306
            - --mysqld.username=root
          env:
            - name: MYSQLD_EXPORTER_PASSWORD
              value: rootpw
          ports:
            - containerPort: 9104
              name: metrics
      volumes:
        - name: mysql-data
          emptyDir: {}
        - name: mysql-init
          configMap:
            name: mysql-init
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: cinemas
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
    - name: metrics
      port: 9104
      targetPort: 9104
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: zookeeper:3.9
          ports:
            - containerPort: 2181
          env:
            - name: ZOO_STANDALONE_ENABLED
              value: "true"
            - name: ZOO_ADMINSERVER_ENABLED
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: cinemas
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
      targetPort: 2181
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: cinemas
data:
  server.properties: |
    broker.id=1
    listeners=PLAINTEXT://:9092
    advertised.listeners=PLAINTEXT://kafka:9092
    log.dirs=/var/lib/kafka/data
    zookeeper.connect=zookeeper:2181
    num.partitions=3
    offsets.topic.replication.factor=1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          command: ["/bin/sh", "-c"]
          args:
            - exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties
          ports:
            - containerPort: 9092
          volumeMounts:
            - name: kafka-config
              mountPath: /opt/kafka/config/server.properties
              subPath: server.properties
      volumes:
        - name: kafka-config
          configMap:
            name: kafka-config
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: cinemas
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apache-config
  namespace: cinemas
data:
  proxy.conf: |
    ProxyPreserveHost On
    ProxyRequests Off

    # ── Security headers ──
    # Replaces the old WildFly-era mod_headers block.
    # CORSFilter.java in dalogin is NOT registered (no @WebFilter, not in web.xml),
    # so all CORS and security headers are handled here at the reverse-proxy layer.
    <IfModule mod_headers.c>
        # Hide server identity
        Header unset X-Powered-By
        Header unset Server

        # HSTS — force HTTPS for all subdomains, with preload eligibility
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"

        # Clickjacking protection (X-Frame-Options for legacy browsers, CSP frame-ancestors is primary)
        Header always set X-Frame-Options "SAMEORIGIN"

        # Disable deprecated XSS auditor — rely on CSP instead
        # (X-XSS-Protection "1;mode=block" can introduce vulnerabilities in older browsers)
        Header always set X-XSS-Protection "0"

        # Prevent MIME-type sniffing
        Header always set X-Content-Type-Options "nosniff"

        # Referrer policy — send origin on cross-origin, full URL on same-origin
        Header always set Referrer-Policy "strict-origin-when-cross-origin"

        # Restrict browser features not used by this application
        # payment=(self) allows Braintree Drop-in to function
        Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)"

        # Content Security Policy — tailored to the actual resources loaded:
        #   script-src:  self + Braintree Drop-in JS SDK (js.braintreegateway.com, assets.braintreegateway.com)
        #   style-src:   self + 'unsafe-inline' (inline <style> in film-review/index.html) + Google Fonts CSS
        #   font-src:    self + Google Fonts files (fonts.gstatic.com)
        #   img-src:     self + milo.crabdance.com (simple-service-webapp pictures) + data: URIs
        #   connect-src: self + milo.crabdance.com (API) + wss: (WebSocket) + Braintree API endpoints
        #   frame-src:   Braintree card input iframes + PayPal
        #   frame-ancestors: self only (replaces X-Frame-Options for CSP-aware browsers)
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self' https://js.braintreegateway.com https://assets.braintreegateway.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' https://milo.crabdance.com data:; connect-src 'self' https://milo.crabdance.com wss://milo.crabdance.com https://api.braintreegateway.com https://client-analytics.braintreegateway.com https://payments.braintree-api.com; frame-src https://assets.braintreegateway.com https://*.paypal.com; frame-ancestors 'self'"

        # CORS — single origin (iOS app and web UI both go through milo.crabdance.com)
        # X-Token is the session/APIKEY header used by the HMAC interceptor in film-review/app.js
        # X-HMAC-HASH, X-MICRO-TIME, X-Device are set by the HMAC transformRequest
        Header always set Access-Control-Allow-Origin "https://milo.crabdance.com"
        Header always set Access-Control-Expose-Headers "X-Token, APIKEY"
        Header always set Access-Control-Max-Age "1800"
        Header always set Access-Control-Allow-Headers "Content-Type, Accept, Authorization, Origin, X-Requested-With, X-Token, X-HMAC-HASH, X-MICRO-TIME, X-Device, Accept-Encoding"
        Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT"
    </IfModule>

    # ── Proxy routes ──
    # WebSocket routes MUST appear before their parent HTTP routes
    # (Apache mod_proxy is first-match; /mbook-1 would swallow /mbook-1/ws)
    ProxyPass /mbook-1/ws ws://mbook:8888/mbook-1/ws
    ProxyPassReverse /mbook-1/ws ws://mbook:8888/mbook-1/ws

    ProxyPass /mbooks-1/ws ws://mbooks:8080/mbooks-1/ws
    ProxyPassReverse /mbooks-1/ws ws://mbooks:8080/mbooks-1/ws

    ProxyPass /login http://dalogin:8080/login retry=0
    ProxyPassReverse /login http://dalogin:8080/login

    ProxyPass /mbook-1 http://mbook:8888/mbook-1 retry=0
    ProxyPassReverse /mbook-1 http://mbook:8888/mbook-1

    ProxyPass /mbooks-1 http://mbooks:8080/mbooks-1 retry=0
    ProxyPassReverse /mbooks-1 http://mbooks:8080/mbooks-1

    ProxyPass /simple-service-webapp http://simple-service-webapp:8085/simple-service-webapp retry=0
    ProxyPassReverse /simple-service-webapp http://simple-service-webapp:8085/simple-service-webapp
---
# ===================== dalogin =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dalogin
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dalogin
  template:
    metadata:
      labels:
        app: dalogin
    spec:
      containers:
        - name: dalogin
          image: dalogin-quarkus:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: jdbc:mysql://mysql:3306/login_
            - name: WILDFLY_URL
              value: http://apache
            - name: QUARKUS_DATASOURCE_DB_KIND
              value: mysql
            - name: QUARKUS_DATASOURCE_USERNAME
              value: sqluser
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: sqluserpw
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: jdbc:mysql://mysql:3306/login_
            - name: QUARKUS_OTEL_ENABLED
              value: "true"
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo:4318
            - name: QUARKUS_OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
---
apiVersion: v1
kind: Service
metadata:
  name: dalogin
  namespace: cinemas
spec:
  selector:
    app: dalogin
  ports:
    - port: 8080
      targetPort: 8080
---
