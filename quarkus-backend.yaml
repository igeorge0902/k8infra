  namespace: cinemas
spec:
  selector:
    app: simple-service-webapp
  ports:
    - port: 8085
      targetPort: 8085
---
# ===================== apache reverse proxy =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apache
  template:
    metadata:
      labels:
        app: apache
    spec:
      containers:
        - name: apache
          image: httpd:2.4-alpine
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              sed -i 's/^#LoadModule proxy_module /LoadModule proxy_module /' /usr/local/apache2/conf/httpd.conf
              sed -i 's/^#LoadModule proxy_http_module /LoadModule proxy_http_module /' /usr/local/apache2/conf/httpd.conf
              sed -i 's/^#LoadModule proxy_wstunnel_module /LoadModule proxy_wstunnel_module /' /usr/local/apache2/conf/httpd.conf
              sed -i 's/^#LoadModule headers_module /LoadModule headers_module /' /usr/local/apache2/conf/httpd.conf
              printf '\nInclude conf/extra/proxy.conf\n' >> /usr/local/apache2/conf/httpd.conf
              httpd-foreground
          ports:
            - containerPort: 80
          volumeMounts:
            - name: apache-config
              mountPath: /usr/local/apache2/conf/extra/proxy.conf
              subPath: proxy.conf
      volumes:
        - name: apache-config
          configMap:
            name: apache-config
---
apiVersion: v1
kind: Service
metadata:
  name: apache
  namespace: cinemas
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: apache
---
# ===================== prometheus =====================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cinemas
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'dalogin'
        metrics_path: /login/q/metrics
        static_configs:
          - targets: ['dalogin:8080']
      - job_name: 'mbook'
        metrics_path: /mbook-1/q/metrics
        static_configs:
          - targets: ['mbook:8888']
      - job_name: 'mbooks'
        metrics_path: /mbooks-1/q/metrics
        static_configs:
          - targets: ['mbooks:8080']
      - job_name: 'simple-service-webapp'
        metrics_path: /simple-service-webapp/q/metrics
        static_configs:
          - targets: ['simple-service-webapp:8085']
      - job_name: 'mysql'
        static_configs:
          - targets: ['mysql:9104']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.2.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=7d
            - --web.enable-lifecycle
            - --web.enable-remote-write-receiver
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: cinemas
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
# ===================== tempo (trace backend) =====================
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: cinemas
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    metrics_generator:
      registry:
        external_labels:
          source: tempo
      processor:
        service_graphs:
          dimensions:
            - service.name
          enable_client_server_prefix: true
          peer_attributes:
            - service.name
            - db.system
            - messaging.system
        span_metrics:
          dimensions:
            - service.name
            - http.method
            - http.status_code
      storage:
        path: /var/tempo/metrics
        remote_write:
          - url: http://prometheus:9090/api/v1/write
    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.7.2
          imagePullPolicy: IfNotPresent
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - containerPort: 3200
              name: http
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          volumeMounts:
            - name: tempo-config
              mountPath: /etc/tempo
            - name: tempo-data
              mountPath: /var/tempo
          readinessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: tempo-config
          configMap:
            name: tempo-config
        - name: tempo-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: cinemas
spec:
  selector:
    app: tempo
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
# ===================== grafana dashboard provisioning =====================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: cinemas
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: cinemas
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: cinemas
data:
  cinemas-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "HTTP Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count[1m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 15, "pointSize": 5, "lineWidth": 2 }
            },
            "overrides": []
          }
        },
        {
          "title": "HTTP Avg Latency (s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "rate(http_server_requests_seconds_sum[5m]) / rate(http_server_requests_seconds_count[5m])",
              "legendFormat": "{{job}} avg"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            },
            "overrides": []
          }
        },
        {
          "title": "HTTP Errors (5xx / min)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{status=~\"5..\"}[1m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "bars", "fillOpacity": 40, "lineWidth": 1 }
            },
            "overrides": []
          }
        },
        {
          "title": "JVM Heap Used (MB)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "jvm_memory_used_bytes{area=\"heap\"} / 1024 / 1024",
              "legendFormat": "{{job}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2 }
            },
            "overrides": []
          }
        },
        {
          "title": "JVM Threads",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "jvm_threads_live_threads",
              "legendFormat": "{{job}} live"
            },
            {
              "expr": "jvm_threads_daemon_threads",
              "legendFormat": "{{job}} daemon"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1 }
            },
            "overrides": []
          }
        },
        {
          "title": "JVM GC Pause (s/min)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "rate(jvm_gc_pause_seconds_sum[1m])",
              "legendFormat": "{{job}} {{cause}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 15, "lineWidth": 1 }
            },
            "overrides": []
          }
        },
        {
          "title": "MySQL Queries per Second",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "rate(mysql_global_status_queries[1m])",
              "legendFormat": "queries/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2 }
            },
            "overrides": []
          }
        },
        {
          "title": "MySQL Connections",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "mysql_global_status_threads_connected",
              "legendFormat": "connected"
            },
            {
              "expr": "mysql_global_status_threads_running",
              "legendFormat": "running"
            },
            {
              "expr": "mysql_global_variables_max_connections",
              "legendFormat": "max_connections"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            },
            "overrides": []
          }
        },
        {
          "title": "MySQL Slow Queries",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "mysql_global_status_slow_queries",
              "legendFormat": "total"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          }
        },
        {
          "title": "MySQL Uptime",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "mysql_global_status_uptime",
              "legendFormat": "uptime"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          }
        },
        {
          "title": "MySQL InnoDB Buffer Pool Hit Rate",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "1 - (rate(mysql_global_status_innodb_buffer_pool_reads[5m]) / (rate(mysql_global_status_innodb_buffer_pool_read_requests[5m]) > 0))",
              "legendFormat": "hit rate"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1, "thresholds": { "steps": [{"color":"red","value":null},{"color":"yellow","value":0.9},{"color":"green","value":0.95}] } },
            "overrides": []
          }
        },
        {
          "title": "MySQL Open Tables",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "mysql_global_status_open_tables",
              "legendFormat": "open"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["cinemas", "quarkus", "mysql"],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "prometheus" }
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Cinemas — Overview",
      "uid": "cinemas-overview",
      "version": 1
    }
---
# ===================== grafana (observability UI) =====================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: cinemas
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        jsonData:
          timeInterval: 15s
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo:3200
        isDefault: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: ''
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: cinemas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.6.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: GF_SERVER_ROOT_URL
              value: https://milo.crabdance.com/grafana/
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /grafana/api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: cinemas
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
# ===================== ingress =====================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apache-ingress
  namespace: cinemas
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - milo.crabdance.com
      secretName: cinemas-tls
  rules:
    - host: milo.crabdance.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apache
                port:
                  number: 80
---
# ===================== grafana UI ingress =====================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: cinemas
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - milo.crabdance.com
      secretName: cinemas-tls
  rules:
    - host: milo.crabdance.com
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
